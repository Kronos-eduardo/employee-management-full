<div class="container">
  <div class="form-header">
    <h1>{{ isEditMode ? 'Edit Employee' : 'Create Employee' }}</h1>
  </div>

  <div class="loading" *ngIf="loading">Loading...</div>

  <form (ngSubmit)="saveEmployee()" *ngIf="!loading" class="employee-form">
    <div *ngIf="error" class="error-message">{{ error }}</div>

    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name *</label>
        <input
          type="text"
          id="firstName"
          [(ngModel)]="employee.firstName"
          name="firstName"
          required
        />
      </div>
      <div class="form-group">
        <label for="middleName">Middle Name</label>
        <input
          type="text"
          id="middleName"
          [(ngModel)]="employee.middleName"
          name="middleName"
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="paternalLastName">Paternal Last Name *</label>
        <input
          type="text"
          id="paternalLastName"
          [(ngModel)]="employee.paternalLastName"
          name="paternalLastName"
          required
        />
      </div>
      <div class="form-group">
        <label for="maternalLastName">Maternal Last Name</label>
        <input
          type="text"
          id="maternalLastName"
          [(ngModel)]="employee.maternalLastName"
          name="maternalLastName"
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="age">Age *</label>
        <input
          type="number"
          id="age"
          [(ngModel)]="employee.age"
          name="age"
          min="18"
          required
        />
      </div>
      <div class="form-group">
        <label for="gender">Gender *</label>
        <select id="gender" [(ngModel)]="employee.gender" name="gender" required>
          <option value="M">Male</option>
          <option value="F">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="birthDate">Birth Date (yyyy-MM-dd) *</label>
        <input
          type="text"
          id="birthDate"
          [(ngModel)]="employee.birthDate"
          name="birthDate"
          placeholder="1994-01-01"
          required
        />
      </div>
      <div class="form-group">
        <label for="jobTitle">Job Title</label>
        <input
          type="text"
          id="jobTitle"
          [(ngModel)]="employee.jobTitle"
          name="jobTitle"
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group checkbox">
        <label for="active">
          <input
            type="checkbox"
            id="active"
            [(ngModel)]="employee.active"
            name="active"
          />
          Active
        </label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ isEditMode ? 'Update Employee' : 'Create Employee' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
